name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ macos-15-intel, macos-26 ]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - name: Run tap syntax checks
        run: brew test-bot --only-tap-syntax

      - name: Fetch Huggle cask
        if: startsWith(matrix.os, 'macos-')
        run: brew fetch --cask --retry --force huggle

      - name: Audit Huggle cask
        if: startsWith(matrix.os, 'macos-')
        run: brew audit --cask --strict --online huggle

      - name: Install Huggle cask
        if: startsWith(matrix.os, 'macos-')
        run: brew install --cask --appdir="$RUNNER_TEMP/Applications" huggle

      - name: Uninstall Huggle cask
        if: startsWith(matrix.os, 'macos-')
        run: brew uninstall --cask --zap huggle
